<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
  #resume-btn {
    position: fixed;
    bottom: 30px;
    right: 90px;
    width: 56px;
    height: 56px;
    border-radius: 28px;
    border: none;
    background: rgba(255,255,255,1);
    color: #333;
    font-size: 24px;
    cursor: pointer;
    z-index: 20;
    display: none;
    backdrop-filter: blur(4px);
  }
  #resume-btn:hover { background: rgba(200,200,200,1); }
</style>
</head>
<body>
<button id="resume-btn" title="恢复自转">🔄</button>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// 场景初始化
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 3);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 地球
const geometry = new THREE.SphereGeometry(1, 64, 64);
const texture = new THREE.TextureLoader().load('earth_texture.jpg');
const material = new THREE.MeshPhongMaterial({ map: texture });
const earth = new THREE.Mesh(geometry, material);
scene.add(earth);

// 光照
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 3, 5);
scene.add(dirLight);

// 控制器（带自动旋转）
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.rotateSpeed = 0.5;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
controls.enableZoom = true;
controls.minDistance = 1.3;
controls.maxDistance = 5;

// 标记点（初始隐藏）
const pinGeo = new THREE.ConeGeometry(0.02, 0.08, 8);
const pinMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
const pin = new THREE.Mesh(pinGeo, pinMat);
pin.visible = false;
earth.add(pin);

// 热力图点云
let heatmapPoints = null;

// 恢复自转按钮
const resumeBtn = document.getElementById('resume-btn');
resumeBtn.addEventListener('click', () => {
  controls.autoRotate = true;
  resumeBtn.style.display = 'none';
});

// 动画循环
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// 经纬度 → 3D 坐标
function latLonToVec3(lat, lon) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = -lon * Math.PI / 180;
  return new THREE.Vector3(
    Math.sin(phi) * Math.cos(theta),
    Math.cos(phi),
    Math.sin(phi) * Math.sin(theta)
  );
}

// 平滑动画工具
function animateCamera(fromTarget, toTarget, fromCam, toCam, duration, onDone) {
  const start = performance.now();
  function step(now) {
    let t = (now - start) / duration;
    if (t > 1) t = 1;
    // easeInOutCubic
    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    controls.target.lerpVectors(fromTarget, toTarget, ease);
    camera.position.lerpVectors(fromCam, toCam, ease);
    controls.update();
    if (t < 1) {
      requestAnimationFrame(step);
    } else if (onDone) {
      onDone();
    }
  }
  requestAnimationFrame(step);
}

// ---- 热力图 ----
window.setHeatmap = function(data) {
  // 清除旧热力点
  if (heatmapPoints) {
    earth.remove(heatmapPoints);
    heatmapPoints.geometry.dispose();
    heatmapPoints.material.dispose();
    heatmapPoints = null;
  }
  if (!data || data.length === 0) return;

  const count = data.length;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);

  // 支持两种格式: [lat,lon,color] 紧凑数组 或 {lat,lon,color} 对象
  const isCompact = Array.isArray(data[0]);

  for (let i = 0; i < count; i++) {
    const d = data[i];
    const lat = isCompact ? d[0] : d.lat;
    const lon = isCompact ? d[1] : d.lon;
    const c   = isCompact ? d[2] : d.color;

    const pos = latLonToVec3(lat, lon);
    const r = 1.006;
    positions[i * 3] = pos.x * r;
    positions[i * 3 + 1] = pos.y * r;
    positions[i * 3 + 2] = pos.z * r;

    colors[i * 3] = ((c >> 16) & 0xFF) / 255;
    colors[i * 3 + 1] = ((c >> 8) & 0xFF) / 255;
    colors[i * 3 + 2] = (c & 0xFF) / 255;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 0.014,
    vertexColors: true,
    blending: THREE.NormalBlending,
    depthTest: false,   // 不测深度，大幅减少GPU开销
    depthWrite: false,
    transparent: true,
    opacity: 0.70,
  });

  heatmapPoints = new THREE.Points(geo, mat);
  earth.add(heatmapPoints);
};

// ---- 供 Flutter 调用的全局函数 ----
window.rotateTo = function(lat, lon, name, value) {
  const targetPos = latLonToVec3(lat, lon);

  // 移动标记到目标位置
  pin.position.copy(targetPos);
  pin.visible = true;

  // 停止自转
  controls.autoRotate = false;
  resumeBtn.style.display = 'block';

  // 计算相机目标位置：从目标点向外延伸 2.5 倍距离，并略偏上
  const outward = targetPos.clone().normalize();
  const camTarget = outward.clone().multiplyScalar(2.5);
  // 稍微抬高一点，让视角更好看
  camTarget.y += 0.3;

  // 动画：从当前相机位置/目标 → 新位置
  const fromTarget = controls.target.clone();
  const fromCam = camera.position.clone();

  animateCamera(fromTarget, targetPos, fromCam, camTarget, 1200, () => {
    // 动画完成后确保精确值
    controls.target.copy(targetPos);
    camera.position.copy(camTarget);
  });

  // 通知父页面
  try {
    window.parent.postMessage(JSON.stringify({
      type: 'locationSelected',
      lat: lat, lon: lon, name: name, value: value
    }), '*');
  } catch (e) {}
};

// 监听来自 Flutter 的指令
window.addEventListener('message', (event) => {
  try {
    const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
    if (!data) return;
    if (data.action === 'rotateTo') {
      window.rotateTo(data.lat, data.lon, data.name, data.value);
    } else if (data.action === 'setHeatmap') {
      window.setHeatmap(data.points);
    }
  } catch (e) {
    console.error('message 处理失败:', e);
  }
});

// 点击地球回传经纬度
window.addEventListener('click', (event) => {
  const mouse = new THREE.Vector2();
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(earth);
  if (intersects.length > 0) {
    const point = intersects[0].point;
    const lat = 90 - Math.acos(point.y / point.length()) * 180 / Math.PI;
    const lon = Math.atan2(-point.z, point.x) * 180 / Math.PI;
    try {
      window.parent.postMessage(JSON.stringify({
        type: 'globeClicked',
        lat: lat.toFixed(4),
        lon: lon.toFixed(4)
      }), '*');
    } catch (e) {}
  }
});
</script>
</body>
</html>
